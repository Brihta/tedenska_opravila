<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedenska hišna opravila</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--sage:#7a9e7e;--sage-l:#a8c5a0;--sage-p:#e8f0e9;--lav:#9b8ec4;--lav-l:#c5bcdf;--lav-p:#ede9f8;--cream:#f5f0e8;--white:#fafaf7;--dark:#2d3436;--mid:#636e72}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
header{background:var(--sage);padding:22px 36px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 18px rgba(0,0,0,.13)}
header .logo{font-size:2.2rem}
header h1{font-family:'Caveat',cursive;font-size:2rem;color:#fff;line-height:1.1}
header h1 small{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.75);display:block}
main{max-width:940px;margin:0 auto;padding:36px 18px 80px;display:flex;flex-direction:column;gap:28px}
.card{background:var(--white);border-radius:18px;padding:26px 30px;box-shadow:0 4px 22px rgba(0,0,0,.07)}
.card-title{font-size:1.1rem;font-weight:900;color:var(--sage);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.num{background:var(--sage);color:#fff;border-radius:50%;width:26px;height:26px;display:grid;place-items:center;font-size:.82rem;font-weight:800;flex-shrink:0}
.fl{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
label.lbl{font-weight:700;font-size:.88rem;color:var(--mid);display:block;margin-bottom:5px}
input[type=text],input[type=number],select,textarea{padding:9px 13px;border:2px solid #e0ddd8;border-radius:11px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;color:var(--dark);background:var(--cream);outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--sage)}
textarea{resize:vertical;width:100%;min-height:70px;line-height:1.5}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:8px 18px;border-radius:20px;border:2px solid #ddd;background:#f0ebe0;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--mid);transition:all .2s;position:relative}
.tab.active{background:var(--sage);border-color:var(--sage);color:#fff}
.tab .del{position:absolute;top:-7px;right:-7px;background:#e17055;color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:.75rem;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:900;line-height:1}
.tab:hover .del{display:flex}
.btn-add-tab{padding:8px 16px;border-radius:20px;border:2px dashed var(--sage-l);background:var(--sage-p);color:var(--sage);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}
.child-name-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #f0ebe0}
.chore-list{display:flex;flex-direction:column;gap:8px}
.chore-item{border:2px solid #e8e4dc;border-radius:14px;overflow:hidden;transition:border-color .2s}
.chore-item.on{border-color:var(--sage-l);box-shadow:0 2px 10px rgba(122,158,126,.13)}
.chore-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--cream);user-select:none}
.chore-head:hover{background:#ede8de}
.chore-cb{width:20px;height:20px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.chore-em{font-size:1.3rem;flex-shrink:0}
.chore-nw{flex:1}
.chore-n{font-weight:700;font-size:.9rem}
.chore-d{font-size:.75rem;color:var(--mid);margin-top:1px}
.arr{font-size:.75rem;color:var(--mid);transition:transform .2s}
.chore-item.on .arr{transform:rotate(180deg)}
.chore-days{display:none;padding:10px 14px 12px;background:var(--sage-p);border-top:2px solid var(--sage-l)}
.chore-item.on .chore-days{display:block}
.day-lbl{font-size:.78rem;font-weight:800;color:var(--sage);margin-bottom:7px}
.day-row{display:flex;flex-wrap:wrap;gap:5px}
.d{padding:4px 11px;border-radius:18px;border:2px solid var(--sage-l);background:#fff;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;color:var(--sage);cursor:pointer;transition:all .15s}
.d.s{background:var(--sage);color:#fff;border-color:var(--sage)}
.d.all{background:var(--lav-p);border-color:var(--lav-l);color:var(--lav)}
.d.all.s{background:var(--lav);border-color:var(--lav);color:#fff}
.custom-row{display:flex;gap:8px;align-items:center;margin-top:14px;padding-top:14px;border-top:2px dashed #e0ddd8;flex-wrap:wrap}
.custom-row input[type=text]:first-child{max-width:58px;text-align:center;font-size:1.2rem}
.btn-sm{background:var(--sage);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;white-space:nowrap}
.btn-sm:hover{background:#6a8e6e}
.pkt-rows{display:flex;flex-direction:column;gap:10px}
.pkt-r{display:flex;align-items:center;gap:12px}
.pkt-r label{font-weight:700;font-size:.9rem;flex:1}
.pkt-r input[type=number]{max-width:95px}
.btn-gen{width:100%;padding:16px;background:linear-gradient(135deg,var(--sage),var(--sage-l));color:#fff;border:none;border-radius:18px;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(122,158,126,.35);transition:transform .15s,box-shadow .15s}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(122,158,126,.4)}
.notice{background:var(--lav-p);border-left:4px solid var(--lav);border-radius:11px;padding:11px 15px;font-size:.85rem;color:#5a4f8a;font-weight:600}

/* PREGOVOR CARD */
.preg-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.preg-btn{padding:9px 18px;border-radius:14px;border:2px solid #e0ddd8;background:var(--cream);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--dark);transition:all .2s;display:flex;align-items:center;gap:7px}
.preg-btn:hover{border-color:var(--sage);background:var(--sage-p);color:var(--sage)}
.preg-btn.active{border-color:var(--sage);background:var(--sage);color:#fff}
.preg-select-wrap{margin-bottom:14px}
.preg-select-wrap select{width:100%}
.preg-preview{background:var(--sage-p);border-left:4px solid var(--sage);border-radius:11px;padding:12px 16px;font-size:.95rem;font-style:italic;color:#2d4a2f;font-weight:600;margin-top:12px;min-height:48px;line-height:1.6}
.preg-pomen{font-size:.8rem;color:var(--mid);font-style:normal;margin-top:6px;font-weight:600}
</style>
</head>
<body>
<header>
  <div class="logo">🏠</div>
  <h1>Tedenska hišna opravila <small>Ustvarjalnik obrazca za tiskanje</small></h1>
</header>
<main>

  <!-- KORAK 1 -->
  <div class="card">
    <div class="card-title"><span class="num">1</span> Osnovni podatki</div>
    <div class="fl">
      <div>
        <label class="lbl">Mesec</label>
        <select id="inp-month" style="width:150px">
          <option value="">izberi</option>
          <option value="Januar">Januar</option>
          <option value="Februar">Februar</option>
          <option value="Marec" selected>Marec</option>
          <option value="April">April</option>
          <option value="Maj">Maj</option>
          <option value="Junij">Junij</option>
          <option value="Julij">Julij</option>
          <option value="Avgust">Avgust</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="December">December</option>
        </select>
      </div>
      <div>
        <label class="lbl">Teden v mesecu</label>
        <select id="inp-week" style="width:150px">
          <option value="">izberi</option>
          <option value="1">1. teden</option>
          <option value="2">2. teden</option>
          <option value="3">3. teden</option>
          <option value="4">4. teden</option>
          <option value="5">5. teden</option>
        </select>
      </div>
    </div>
  </div>

  <!-- KORAK 2 -->
  <div class="card">
    <div class="card-title"><span class="num">2</span> Otroci in njihova opravila</div>
    <div class="notice" style="margin-bottom:18px">Za vsakega otroka posebej izberite opravila in dneve. Kliknite na zavihek z imenom otroka da preklopite.</div>
    <div class="tabs" id="tabs-bar"></div>
    <div id="child-panel"></div>
  </div>

  <!-- KORAK 3 -->
  <div class="card">
    <div class="card-title"><span class="num">3</span> Žepnina</div>
    <div class="pkt-rows">
      <div class="pkt-r">
        <label for="pkt-amt">Tedenska žepnina (€):</label>
        <input type="number" id="pkt-amt" min="0" step="0.5" value="5" style="max-width:95px" oninput="updatePktPreview()">
      </div>
      <div class="notice" id="pkt-preview"></div>
    </div>
  </div>

  <!-- KORAK 4 – PREGOVOR -->
  <div class="card">
    <div class="card-title"><span class="num">4</span> Pregovor tedna (neobvezno)</div>
    <div class="preg-btns">
      <button class="preg-btn" id="btn-pick" onclick="showMode('pick')">📋 Izberi iz seznama</button>
      <button class="preg-btn" id="btn-own" onclick="showMode('own')">✏️ Napiši svojega</button>
      <button class="preg-btn" id="btn-rand" onclick="pickRandom()">🎲 Izberi naključno</button>
      <button class="preg-btn" id="btn-none" onclick="showMode('none')">✕ Brez pregovora</button>
    </div>

    <div id="preg-pick-wrap" class="preg-select-wrap" style="display:none">
      <label class="lbl">Kategorija</label>
      <select id="preg-cat" onchange="fillPregovorList()" style="margin-bottom:10px">
        <option value="0">Delo in trud</option>
        <option value="1">Družina in odnosi</option>
        <option value="2">Pomoč drugim in sodelovanje</option>
      </select>
      <label class="lbl">Pregovor</label>
      <select id="preg-list" onchange="selectPregovor()"></select>
    </div>

    <div id="preg-own-wrap" style="display:none">
      <label class="lbl">Vpiši pregovor</label>
      <textarea id="preg-own-text" placeholder="npr. Kdor seže visoko, mora trdno stati." oninput="updatePregovorPreview()"></textarea>
    </div>

    <div id="preg-preview" class="preg-preview" style="display:none"></div>
  </div>

  <button class="btn-gen" onclick="generatePrint()">📄 Ustvari PDF za tiskanje</button>
</main>

<script>
/* ── PREGOVORI DATA ─────────────────────────────────────────────────────── */
const PREGOVORI = [
  { ime:"Delo in trud", seznam:[
    {t:"Brez muje se še čevelj ne obuje.",p:"Brez truda ni rezultata."},
    {t:"Rana ura, zlata ura.",p:"Če začneš zgodaj, boš več naredil in se bolje počutil."},
    {t:"Vaja dela mojstra, če mojster dela vajo.",p:"Nič ne gre od prvega dne, treba je ponavljati."},
    {t:"Kar lahko storiš danes, ne odlašaj na jutri.",p:"Odlašanje samo kopiči težave."},
    {t:"Po delu se sladko spi.",p:"Občutek zadovoljstva po opravljeni nalogi je najboljši počitek."},
    {t:"Pridne roke vse zmorejo.",p:"Z voljo in delom premagamo vsako oviro."},
    {t:"Kdor ne dela, naj ne jé.",p:"Vsi moramo prispevati k skupnemu dobremu."},
    {t:"Malo delo, malo kruha; veliko delo, veliko kruha.",p:"Rezultat je sorazmeren s trudom."},
    {t:"Če ne poseješ, ne boš žel.",p:"Brez vložka na začetku ni uspeha na koncu."},
    {t:"Leni hodi dvakrat.",p:"Površno delo zahteva popravljanje."},
    {t:"Kjer je volja, tam je pot.",p:"Z močno željo vedno najdemo način."},
    {t:"Nobeno delo ni sramotno, sramotno je le lenarjenje.",p:"Vsako delo je častno."},
    {t:"Zrno do zrna pogača, kamen do kamna palača.",p:"Majhna dejanja se seštejejo v velik uspeh."},
    {t:"Kdor zgodaj vstaja, mu kruha ostaja.",p:"Zgodnji začetek prinaša obilje."},
    {t:"Delo krepi človeka.",p:"Z delom postajamo spretnejši in močnejši."},
    {t:"Železo se kuje, dokler je vroče.",p:"Izkoristi priložnost takoj."},
    {t:"Dober začetek je pol uspeha.",p:"Prvi korak je ključen."},
  ]},
  { ime:"Družina in odnosi", seznam:[
    {t:"Ljubo doma, kdor ga ima.",p:"Doma smo najbolj varni in ljubljeni."},
    {t:"Povsod je lepo, a doma je najlepše.",p:"Dom je neprecenljiv."},
    {t:"Kar se Janezek nauči, to Janez zna.",p:"Znanje iz otroštva ostane za vedno."},
    {t:"Jabolko ne pade daleč od drevesa.",p:"Otroci so podobni staršem."},
    {t:"Kri ni voda.",p:"Družinske vezi so izjemno močne."},
    {t:"Lepa beseda lepo mesto najde.",p:"S prijaznostjo dosežeš več."},
    {t:"Kar ne želiš, da drugi tebi storijo, ne stori ti drugim.",p:"Zlato pravilo odnosov."},
    {t:"Tiha voda bregove dere.",p:"Tihi ljudje imajo lahko veliko moč."},
    {t:"Beseda ni konj.",p:"Besede imajo moč, da ranijo ali pomirijo."},
    {t:"Sreča je v majhnih stvareh.",p:"Majhni trenutki z družino so največje bogastvo."},
    {t:"Kdor visoko leta, nizko pade.",p:"Pomembnost skromnosti."},
    {t:"Dobra beseda nič ne stane, a veliko velja.",p:"Prijaznost je brezplačna, a neprecenljiva."},
    {t:"Starejše spoštuj, mlajše pa uči.",p:"Spoštovanje in prenos znanja."},
    {t:"V slogi je moč.",p:"Enotnost nas dela močne."},
    {t:"Kdor drugega spoštuje, sebe ne ponižuje.",p:"Spoštovanje do drugih dviguje lastno vrednost."},
    {t:"Oblast je v glavi, ne v pesti.",p:"Razum je pomembnejši od moči."},
    {t:"Laž ima kratke noge.",p:"Resnica se vedno izve."},
  ]},
  { ime:"Pomoč drugim in sodelovanje", seznam:[
    {t:"Več glav več ve.",p:"Skupinsko razmišljanje prinaša boljše rešitve."},
    {t:"Roka roko umije.",p:"Vzajemna pomoč je ključna."},
    {t:"Prijatelja spoznaš v nesreči.",p:"Pravi prijatelji pomagajo v težavah."},
    {t:"Dobra dela se z dobrim vračajo.",p:"Dobrota se povrne."},
    {t:"Ena lastovka še ne prinese pomladi.",p:"Za večje spremembe je potrebnih več ljudi."},
    {t:"Kdor hitro pomaga, dvakrat pomaga.",p:"Takojšnja pomoč je najbolj učinkovita."},
    {t:"Kar daš, to imaš.",p:"Darovanje osrečuje darovalca."},
    {t:"Kdor drugim jamo koplje, sam vanjo pade.",p:"Zlobna dejanja se vrnejo storilcu."},
    {t:"Sloga gradi, nesloga razdira.",p:"Sodelovanje ustvarja, prepir uničuje."},
    {t:"Dobro delo ne potrebuje hvale.",p:"Pomagamo, ker je to prav, ne za pozornost."},
    {t:"Prijaznost odpira vsa vrata.",p:"S prijaznostjo je vse lažje."},
    {t:"Kdor prosi, mu bo dano.",p:"Ni napačno prositi za pomoč."},
    {t:"S skupnimi močmi se daleč pride.",p:"Sodelovanje omogoča velike dosežke."},
    {t:"Deli svojo srečo in boš srečnejši.",p:"Deljena sreča je dvojna sreča."},
    {t:"Biti dober je več kot biti bogat.",p:"Značaj je pomembnejši od denarja."},
    {t:"Kjer sta dva, je tretjemu lažje.",p:"Druščina olajša težko delo."},
    {t:"Darovano srce je najboljše darilo.",p:"Iskrena pozornost pomeni največ."},
    {t:"Svet stoji na dobrih ljudeh.",p:"Dobrota ohranja naš svet."},
  ]},
];

let pregMode = 'none'; // 'none' | 'pick' | 'own' | 'random'
let selectedPregovor = null; // {t, p}

function showMode(mode) {
  pregMode = mode;
  document.getElementById('preg-pick-wrap').style.display = mode==='pick' ? 'block' : 'none';
  document.getElementById('preg-own-wrap').style.display  = mode==='own'  ? 'block' : 'none';
  ['btn-pick','btn-own','btn-rand','btn-none'].forEach(id => document.getElementById(id).classList.remove('active'));
  if(mode==='pick') { document.getElementById('btn-pick').classList.add('active'); fillPregovorList(); selectPregovor(); }
  if(mode==='own')  { document.getElementById('btn-own').classList.add('active');  updatePregovorPreview(); }
  if(mode==='none') { document.getElementById('btn-none').classList.add('active'); selectedPregovor=null; document.getElementById('preg-preview').style.display='none'; }
}

function fillPregovorList() {
  const cat = +document.getElementById('preg-cat').value;
  const sel = document.getElementById('preg-list');
  sel.innerHTML = PREGOVORI[cat].seznam.map((p,i) => `<option value="${i}">${p.t}</option>`).join('');
  selectPregovor();
}

function selectPregovor() {
  const cat = +document.getElementById('preg-cat').value;
  const idx = +document.getElementById('preg-list').value;
  selectedPregovor = PREGOVORI[cat].seznam[idx];
  showPregovorPreview(selectedPregovor);
}

function pickRandom() {
  const allAll = PREGOVORI.flatMap(k=>k.seznam);
  selectedPregovor = allAll[Math.floor(Math.random()*allAll.length)];
  pregMode = 'random';
  ['btn-pick','btn-own','btn-rand','btn-none'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('btn-rand').classList.add('active');
  document.getElementById('preg-pick-wrap').style.display='none';
  document.getElementById('preg-own-wrap').style.display='none';
  showPregovorPreview(selectedPregovor);
}

function updatePregovorPreview() {
  const txt = document.getElementById('preg-own-text').value.trim();
  selectedPregovor = txt ? {t:txt, p:''} : null;
  showPregovorPreview(selectedPregovor);
}

function showPregovorPreview(p) {
  const el = document.getElementById('preg-preview');
  if(!p){ el.style.display='none'; return; }
  el.style.display='block';
  el.innerHTML = `„${p.t}"${p.p ? `<div class="preg-pomen">💡 ${p.p}</div>` : ''}`;
}

/* ── CHORES ─────────────────────────────────────────────────────────────── */
const DAYS=['pon.','tor.','sre.','čet.','pet.','sob.','ned.'];
const DEF=[
  {emoji:'🍽️',name:'Pomivalni stroj',desc:'Polnjenje in praznjenje'},
  {emoji:'🗑️',name:'Smeti',desc:'Odnašanje in ločevanje'},
  {emoji:'🌿',name:'Rastline',desc:'Zalivanje vseh rož'},
  {emoji:'🚗',name:'Avto',desc:'Pomoč pri čiščenju'},
  {emoji:'🧹',name:'Stopnice / hodnik',desc:'Pometanje in urejanje'},
  {emoji:'🧺',name:'Perilo',desc:'Zlaganje in razvrščanje perila'},
  {emoji:'🪣',name:'Sesanje',desc:'Sesanje celotnega stanovanja'},
  {emoji:'🧴',name:'Prah',desc:'Brisanje prahu po pohištvu'},
  {emoji:'🪞',name:'Ogledala',desc:'Čiščenje vseh ogledal'},
  {emoji:'🏡',name:'Dvorišče',desc:'Pometanje ali čiščenje zunaj'},
  {emoji:'🛏️',name:'Postelja',desc:'Postiljanje vsak dan'},
  {emoji:'🍳',name:'Pomoč pri kuhanju',desc:'Priprava obroka'},
];
function mkChild(){return{name:'',chores:DEF.map(c=>({...c,enabled:false,days:[]}))}}
let activeTab=0, children=[mkChild()];

function renderTabs(){
  const bar=document.getElementById('tabs-bar');
  bar.innerHTML='';
  children.forEach((ch,i)=>{
    const t=document.createElement('button');
    t.className='tab'+(i===activeTab?' active':'');
    const sp=document.createElement('span');
    sp.textContent=ch.name||`Otrok ${i+1}`;
    t.appendChild(sp);
    t.addEventListener('click',()=>{activeTab=i;renderTabs();renderPanel();});
    if(children.length>1){
      const x=document.createElement('button');
      x.className='del';x.textContent='×';
      x.addEventListener('click',e=>{e.stopPropagation();children.splice(i,1);if(activeTab>=children.length)activeTab=children.length-1;renderTabs();renderPanel();});
      t.appendChild(x);
    }
    bar.appendChild(t);
  });
  const add=document.createElement('button');
  add.className='btn-add-tab';add.textContent='＋ Dodaj otroka';
  add.addEventListener('click',()=>{children.push(mkChild());activeTab=children.length-1;renderTabs();renderPanel();});
  bar.appendChild(add);
  updatePktPreview();
}

function renderPanel(){
  const ch=children[activeTab];
  const p=document.getElementById('child-panel');
  let h=`<div class="child-name-row">
    <label class="lbl" style="margin:0;white-space:nowrap">Ime otroka:</label>
    <input type="text" value="${esc(ch.name)}" placeholder="Vpiši ime..." style="max-width:280px" id="nameInput">
  </div><div class="chore-list">`;
  ch.chores.forEach((c,ci)=>{
    h+=`<div class="chore-item${c.enabled?' on':''}">
      <div class="chore-head" data-ci="${ci}">
        <input class="chore-cb" type="checkbox" ${c.enabled?'checked':''} data-ci="${ci}">
        <span class="chore-em">${c.emoji}</span>
        <div class="chore-nw"><div class="chore-n">${esc(c.name)}</div>${c.desc?`<div class="chore-d">${esc(c.desc)}</div>`:''}</div>
        <span class="arr">▾</span>
      </div>
      <div class="chore-days">
        <div class="day-lbl">Izberi dneve:</div>
        <div class="day-row">
          <button class="d all${c.days.length===7?' s':''}" data-ci="${ci}" data-all="1">Vsak dan</button>
          ${DAYS.map((d,di)=>`<button class="d${c.days.includes(di)?' s':''}" data-ci="${ci}" data-di="${di}">${d}</button>`).join('')}
        </div>
      </div>
    </div>`;
  });
  h+=`</div><div class="custom-row">
    <input type="text" id="cem" placeholder="🧹">
    <input type="text" id="cnm" placeholder="Ime opravila" style="flex:1">
    <input type="text" id="cds" placeholder="Opis (neobvezno)" style="flex:1.5">
    <button class="btn-sm" id="addChoreBtn">＋ Dodaj</button>
  </div>`;
  p.innerHTML=h;
  p.querySelector('#nameInput').addEventListener('input',function(){
    children[activeTab].name=this.value;
    const tabs=document.querySelectorAll('.tab');
    if(tabs[activeTab]){const sp=tabs[activeTab].querySelector('span');if(sp)sp.textContent=this.value||`Otrok ${activeTab+1}`;}
    updatePktPreview();
  });
  p.querySelectorAll('.chore-head').forEach(el=>{
    el.addEventListener('click',function(e){if(e.target.classList.contains('chore-cb'))return;const ci=+this.dataset.ci;children[activeTab].chores[ci].enabled=!children[activeTab].chores[ci].enabled;renderPanel();});
  });
  p.querySelectorAll('.chore-cb').forEach(el=>{
    el.addEventListener('change',function(){const ci=+this.dataset.ci;children[activeTab].chores[ci].enabled=this.checked;renderPanel();});
  });
  p.querySelectorAll('[data-all]').forEach(el=>{
    el.addEventListener('click',function(){const ci=+this.dataset.ci;const c=children[activeTab].chores[ci];c.days=c.days.length===7?[]:[0,1,2,3,4,5,6];renderPanel();});
  });
  p.querySelectorAll('[data-di]').forEach(el=>{
    el.addEventListener('click',function(){const ci=+this.dataset.ci;const di=+this.dataset.di;const arr=children[activeTab].chores[ci].days;const idx=arr.indexOf(di);if(idx===-1)arr.push(di);else arr.splice(idx,1);arr.sort((a,b)=>a-b);renderPanel();});
  });
  p.querySelector('#addChoreBtn').addEventListener('click',()=>{
    const em=document.getElementById('cem').value.trim()||'⭐';
    const nm=document.getElementById('cnm').value.trim();
    const ds=document.getElementById('cds').value.trim();
    if(!nm){alert('Vnesite ime opravila.');return;}
    children[activeTab].chores.push({emoji:em,name:nm,desc:ds,enabled:true,days:[]});
    renderPanel();
  });
  updatePktPreview();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function totalTaskDays(){
  return children.reduce((sum,ch)=>sum+ch.chores.filter(c=>c.enabled).reduce((s,c)=>s+c.days.length,0),0);
}
function calcDeduction(amt){
  const total=totalTaskDays();
  if(!total)return 0;
  return Math.floor(amt/total*10)/10;
}
function receiveVerb(){
  const n=children.filter(c=>c.name.trim()).length;
  if(n===1)return'prejmeš';
  if(n===2)return'prejmeta';
  return'prejmete';
}
function updatePktPreview(){
  const amt=parseFloat(document.getElementById('pkt-amt').value)||0;
  const ded=calcDeduction(amt);
  const verb=receiveVerb();
  const total=totalTaskDays();
  const preview=document.getElementById('pkt-preview');
  if(!amt){preview.innerHTML='Vnesite znesek žepnine.';return;}
  preview.innerHTML=
    `<strong>Nedeljski dogovor:</strong> Če so vsa opravila narejena, ${verb} <strong>${amt.toFixed(2)} €</strong>.<br>`+
    `<strong>Brez opravljenih del, žepnine ni!</strong><br>`+
    (total>0
      ?`<strong>Za vsako neopravljeno delo se odšteje ${ded.toFixed(2)} €.</strong>`+
        `<span style="font-weight:400;font-size:.8em;color:#7a6aaa"> (${amt.toFixed(2)}€ ÷ ${total} opravil = ${(amt/total).toFixed(4)}€ → zaokroženo navzdol na 0,10€)</span>`
      :`<em style="color:#a08080">Izberite opravila in dneve za izračun odbitka.</em>`);
}

/* ── GENERATE ───────────────────────────────────────────────────────────── */
function generatePrint(){
  const month=document.getElementById('inp-month').value||'Marec';
  const week=document.getElementById('inp-week').value;
  const valid=children.filter(c=>c.name.trim());
  if(!week){alert('Izberite teden.');return;}
  if(!valid.length){alert('Dodajte vsaj enega otroka z imenom.');return;}
  if(valid.every(c=>c.chores.every(ch=>!ch.enabled))){alert('Izberite vsaj eno opravilo.');return;}

  const pktAmt=parseFloat(document.getElementById('pkt-amt').value)||5;
  const ded=calcDeduction(pktAmt);
  const verb=receiveVerb();
  const pktW=22;
  const childW=((100-pktW)/valid.length).toFixed(1);

  const pktCol=`<div class="col col-pkt" style="width:${pktW}%">
    <div class="col-hdr hdr-lav">Opravila</div>
    <div class="pkt-box">
      <div class="pkt-title">Žepnina</div>
      <p>Tedenska žepnina je določena na <strong>${pktAmt.toFixed(2)} €</strong>.</p>
      <p style="margin-top:5px">Nedeljski dogovor:<br>Če so vsa opravila narejena, ${verb} <strong>${pktAmt.toFixed(2)} €</strong>.</p>
      <p class="pkt-bold">Brez opravljenih del, žepnine ni!</p>
      <p class="pkt-bold">Za vsako neopravljeno delo se odšteje ${ded.toFixed(2)} €.</p>
    </div>
    <div class="skupaj-wrap">
      <div class="skupaj-bar">Skupaj kljukic:</div>
      <div class="pig-row"><span class="pig-em">💰</span><span class="pig-line"></span></div>
    </div>
  </div>`;

  const childCols=valid.map(ch=>{
    const active=ch.chores.filter(c=>c.enabled);
    const cards=active.map(c=>{
      const dayBoxes=c.days.map(di=>`
        <div class="day-row-item">
          <div class="day-lbl-box">${DAYS[di]}</div>
          <div class="day-check-box"></div>
        </div>`).join('');
      return `<div class="chore-card">
        <div class="chore-icon">${c.emoji}</div>
        <div class="chore-txt"><div class="c-name">${esc(c.name)}</div>${c.desc?`<div class="c-desc">${esc(c.desc)}</div>`:''}</div>
        <div class="day-col">${dayBoxes}</div>
      </div>`;
    }).join('');
    return `<div class="col col-child" style="width:${childW}%">
      <div class="col-hdr hdr-grn">${esc(ch.name)}</div>
      ${cards}
      <div class="skupaj-wrap">
        <div class="skupaj-bar">Skupaj kljukic:</div>
        <div class="pig-row"><span class="pig-em">💰</span><span class="pig-line"></span></div>
      </div>
    </div>`;
  }).join('');

  // Pregovor footer
  const pregHtml = selectedPregovor
    ? `<div class="preg-footer">
        <span class="preg-icon">📖</span>
        <div class="preg-content">
          <div class="preg-text">„${selectedPregovor.t}"</div>
          ${selectedPregovor.p ? `<div class="preg-pomen">${selectedPregovor.p}</div>` : ''}
        </div>
      </div>` : '';

  const html=`<!DOCTYPE html>
<html lang="sl"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>

<body><div class="page">
<div class="pg-hdr">
  <div><div class="t-it">Tedenska</div><div class="t-bd">hišna opravila</div></div>
  <div class="wk-blk"><div class="wk-lbl">${month}:</div><div class="wk-val">${week}.teden</div></div>

${pregHtml}

  const win=window.open('','_blank');
  if(!win){alert('Dovolite pojavna okna za to stran (pop-ups).');return;}
  win.document.open();win.document.write(html);win.document.close();
}

renderTabs();
renderPanel();
updatePktPreview();
</script>
